version: '3.8'

services:
  # ==========================================
  # CAPA DE PERSISTENCIA (BASES DE DATOS)
  # ==========================================
  # 1. Base de datos para Ingesta
  db-ingestion:
    image: postgres:15-alpine
    container_name: db-ingestion
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_ingestion
    ports:
      - "5432:5432" # Accesible en localhost:5432
    volumes:
      - pg_data_ingestion:/var/lib/postgresql/data
    networks:
      - territorial_network

  # 2. Base de datos para Transformación
  db-transformation:
    image: postgres:15-alpine
    container_name: db-transformation
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_transformation
    ports:
      - "5433:5432" # Accesible en localhost:5433
    volumes:
      - pg_data_transformation:/var/lib/postgresql/data
    networks:
      - territorial_network

  # 3. Base de datos para Analítica y Scoring
  db-analytics:
    image: postgres:15-alpine
    container_name: db-analytics
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_analytics
    ports:
      - "5434:5432" # Accesible en localhost:5434
    volumes:
      - pg_data_analytics:/var/lib/postgresql/data
    networks:
      - territorial_network

  # 4. Base de datos para Machine Learning
  db-ml:
    image: postgres:15-alpine
    container_name: db-ml
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_ml
    ports:
      - "5435:5432" # Accesible en localhost:5435
    volumes:
      - pg_data_ml:/var/lib/postgresql/data
    networks:
      - territorial_network

  # 5. Base de datos para Recomendaciones
  db-recommendations:
    image: postgres:15-alpine
    container_name: db-recommendations
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_recommendations
    ports:
      - "5436:5432" # Accesible en localhost:5436
    volumes:
      - pg_data_recommendations:/var/lib/postgresql/data
    networks:
      - territorial_network

  # 6. Base de datos para Configuración
  db-configuration:
    image: postgres:15-alpine
    container_name: db-configuration
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_configuration
    ports:
      - "5437:5432" # Accesible en localhost:5437
    volumes:
      - pg_data_configuration:/var/lib/postgresql/data
    networks:
      - territorial_network

  # 7. Base de datos para Auditoría y Trazabilidad
  db-audit:
    image: postgres:15-alpine
    container_name: db-audit
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: db_audit
    ports:
      - "5438:5438" # Accesible en localhost:5438
    volumes:
      - pg_data_audit:/var/lib/postgresql/data
    networks:
      - territorial_network

  # ==========================================
  # CAPA DE MICROSERVICIOS DE NEGOCIO
  # ==========================================
  
  # 8. Microservicio de Ingesta
  ms-ingestion:
    build:
      context: ../ms-ingestion
      dockerfile: Dockerfile
    container_name: ms-ingestion
    env_file:
      - ../ms-ingestion/.env
    environment:
      - APP_PORT=8000
      # Apunta internamente a db-ingestion en el puerto nativo 5432
      - DATABASE_URL=postgresql+psycopg2://admin:admin_password@db-ingestion:5432/db_ingestion
    volumes:
      - ../ms-ingestion:/app # Hot Reload activado
    depends_on:
      - db-ingestion
    networks:
      - territorial_network

  # 9. Microservicio de Transformación
  ms-transform:
    build:
      context: ../ms-transform
      dockerfile: Dockerfile
    container_name: ms-transform
    env_file:
      - ../ms-transform/.env
    environment:
      - APP_PORT=8000
      - DATABASE_URL=postgresql+psycopg2://admin:admin_password@db-transformation:5432/db_transformation
      - INGESTION_SERVICE_URL=http://ms-ingestion:8000
    volumes:
      - ../ms-transform:/app
    depends_on:
      - db-transformation
    networks:
      - territorial_network

  # 10. Microservicio de Auditoría
  ms-auditoria:
    build:
      context: ../ms-auditoria
      dockerfile: Dockerfile
    container_name: ms-auditoria
    env_file:
      - ../ms-auditoria/.env
    environment:
      - APP_PORT=8000
      - DATABASE_URL=postgresql+psycopg2://admin:admin_password@db-audit:5432/db_audit
    volumes:
      - ../ms-auditoria:/app
    depends_on:
      - db-audit
    networks:
      - territorial_network

  # ==========================================
  # CAPA DE ORQUESTACIÓN / EXPERIENCIA
  # ==========================================

  # 11. API Gateway (Punto de entrada único)
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    env_file:
      - ../api-gateway/.env
    environment:
      - APP_PORT=8000
      - MS_INGESTION_URL=http://ms-ingestion:8000
      - FRONTEND_URL=http://localhost:3000
      - MS_TRANSFORM_URL=http://ms-transform:8000
    ports:
      # CA 3: Este es el ÚNICO microservicio expuesto al exterior
      - "8000:8000"
    volumes:
      - ../api-gateway:/app
    depends_on:
      - ms-ingestion
      - ms-transform
      - ms-auditoria
    networks:
      - territorial_network

  # 12. Frontend Web (Next.js / React)
  frontend-web:
    build:
      context: ../../data-frontend # Ruta a la carpeta de tu frontend
      dockerfile: Dockerfile
    container_name: frontend-web
    ports:
      - "3000:3000" # Exponemos el frontend en localhost:3000
    volumes:
      - ../../data-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # Para Server Actions dentro de Docker, usamos el nombre del contenedor del Gateway
      - API_GATEWAY_URL=http://api-gateway:8000
    depends_on:
      - api-gateway
    networks:
      - territorial_network

networks:
  territorial_network:
    driver: bridge

volumes:
  pg_data_ingestion:
  pg_data_transformation:
  pg_data_analytics:
  pg_data_ml:
  pg_data_recommendations:
  pg_data_configuration:
  pg_data_audit: